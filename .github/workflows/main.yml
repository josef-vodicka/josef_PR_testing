name: Trigger Power Automate

on:
  pull_request:
    types: [review_requested]

jobs:
  trigger:
    runs-on: ubuntu-latest
    if: contains(fromJSON('["JosefVodicka"]'), github.event.requested_reviewer.login)
    steps:
      - name: Call Power Automate Flow
        run: |
          curl -X POST "${{ secrets.POWER_AUTOMATE_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "repo": "${{ github.repository }}",
              "event": "${{ github.event_name }}",
              "ref": "${{ github.ref }}",
              "actor": "${{ github.actor }}",
              "sha": "${{ github.sha }}",
              "pr_number": "${{ github.event.pull_request.number }}",
              "pr_title": "${{ github.event.pull_request.title }}",
              "pr_action": "${{ github.event.action }}",
              "requested_reviewer": "${{ github.event.requested_reviewer.login }}"
            }'
